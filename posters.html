<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posters | Arjun Krishna</title>
    <meta name="description"
        content="Professional Portfolio of Arjun Krishna - Video Editor, Videographer, and Engineering Student.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="particles-js"></div>
    <div class="custom-cursor"></div>
    <div class="cursor-follower"></div>

    <!-- Navigation -->
    <header class="header">
        <a href="index.html" class="logo">XRJ</a>
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><a href="work.html" class="nav-link">Work</a></li>
                <li><a href="posters.html" class="nav-link active">Posters</a></li>
                <li><a href="certificates.html" class="nav-link">Certificates</a></li>
                <li><a href="index.html#skills" class="nav-link">Skills</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact</a></li>
            </ul>
        </nav>
        <div class="mobile-toggle">
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <main style="padding-top: 100px;">
        <!-- Posters Section -->
        <section id="posters" class="posters section">
            <div class="container">
                <div class="section-header fade-up visible">
                    <h2>Posters</h2>
                    <div class="line"></div>
                </div>
                <div class="posters-grid fade-up visible delay-1">
                    <div class="poster-item">
                        <img src="posters/1.png" alt="Poster 1" loading="lazy">
                    </div>
                    <div class="poster-item">
                        <img src="posters/2.png" alt="Poster 2" loading="lazy">
                    </div>
                    <div class="poster-item">
                        <img src="posters/2.1.png" alt="Poster 2.1" loading="lazy">
                    </div>
                    <div class="poster-item">
                        <img src="posters/3.png" alt="Poster 3" loading="lazy">
                    </div>
                    <div class="poster-item hide">
                        <img src="posters/4.png" alt="Poster 4" loading="lazy">
                    </div>
                    <div class="poster-item hide">
                        <img src="posters/5.png" alt="Poster 5" loading="lazy">
                    </div>
                    <div class="poster-item hide">
                        <img src="posters/6.png" alt="Poster 6" loading="lazy">
                    </div>
                    <div class="poster-item hide">
                        <img src="posters/7.png" alt="Poster 7" loading="lazy">
                    </div>
                    <div class="poster-item hide">
                        <img src="posters/8.png" alt="Poster 8" loading="lazy">
                    </div>
                    <div class="poster-item hide">
                        <img src="posters/9.png" alt="Poster 9" loading="lazy">
                    </div>
                    <div class="poster-item hide">
                        <img src="posters/10.png" alt="Poster 10" loading="lazy">
                    </div>
                    <div class="poster-item hide">
                        <img src="posters/11.png" alt="Poster 11" loading="lazy">
                    </div>
                    <div class="poster-item hide">
                        <img src="posters/12.png" alt="Poster 12" loading="lazy">
                    </div>
                </div>
                <div class="show-more-container fade-up visible delay-1" style="text-align: center; margin-top: 60px;">
                    <a href="javascript:void(0)" id="showMorePostersBtn" class="btn btn-secondary"
                        style="padding: 16px 40px; font-size: 1.1rem; border-radius: 50px; background: rgba(255,255,255,0.05); transition: all 0.3s; box-shadow: 0 0 20px rgba(255,0,0,0.1);">
                        <i class="fas fa-plus" style="margin-right: 10px;"></i> Show More Posters
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Arjun Krishna. All rights reserved.</p>
        </div>
    </footer>

    <!-- Video Modal -->
    <div id="videoModal" class="modal">
        <span class="close-modal"><i class="fas fa-times"></i></span>
        <div class="modal-content">
            <video id="modalVideo" controls playsinline>
                <source src="" type="video/mp4">
            </video>
        </div>
    </div>

    <!-- tsParticles Interactive Galaxy Library -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
